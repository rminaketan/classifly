# Classifly.in — Supabase local config
# Run `supabase start` to bring up Postgres + auth + storage locally.

project_id = "classifly"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your Classifly OTP is {{ .Code }}. Valid for 5 minutes. Never share with anyone."

[auth.sms.twilio]
enabled = false

# MSG91 is configured in the Supabase cloud dashboard for production.
# Local dev uses the inbucket sink — find OTPs at http://localhost:54324

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

[analytics]
enabled = false

[experimental]
orioledb_version = ""
