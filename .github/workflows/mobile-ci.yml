name: mobile-ci

on:
  pull_request:
    paths:
      - 'apps/mobile/**'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test || true
      - run: flutter analyze
      - run: flutter test --no-pub

  build-android:
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Build debug APK
        run: |
          flutter create . --platforms=android --org in.classifly --project-name classifly || true
          flutter build apk --debug
