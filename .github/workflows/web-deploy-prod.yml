name: web-deploy-prod

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'

concurrency:
  group: web-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production # Requires manual approval — configure in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://classifly.in
          NEXT_PUBLIC_R2_PUBLIC_URL: https://media.classifly.in
          NODE_ENV: production
        run: pnpm --filter web build

      - name: Deploy to Cloudflare Pages (prod)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: classifly-web-prod
          branch: main
          directory: apps/web/.next

      - name: Check for Sentry token
        id: sentry_check
        run: |
          if [ -n "${SENTRY_AUTH_TOKEN}" ]; then echo "has_token=true" >> $GITHUB_OUTPUT; fi
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Notify Sentry of release
        if: steps.sentry_check.outputs.has_token == 'true'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: classifly
          SENTRY_PROJECT: web
        with:
          environment: production
          version: ${{ github.sha }}
